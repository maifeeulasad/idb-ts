  generate-docs:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    # needs:
    #   [
    #     generate-performance-report,
    #   ]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
      - name: Install dependencies
        run: npm i -g pnpm && pnpm i --frozen-lockfile
      - name: Generate Documentation
        run: pnpm docs:generate
      - name: Add Google tag to generated documentation pages
        run: |
          python3 <<'PY'
          from pathlib import Path
          from textwrap import dedent

          snippet = dedent("""
          <!-- Google tag (gtag.js) -->
          <script async src=\"https://www.googletagmanager.com/gtag/js?id=G-3G1RNC5YLT\"></script>
          <script>
            window.dataLayer = window.dataLayer || [];
            function gtag(){dataLayer.push(arguments);}
            gtag('js', new Date());

            gtag('config', 'G-3G1RNC5YLT');
          </script>
          """).strip()

          for path in Path('./docs').glob('**/*.html'):
            if not path.exists():
              continue

            content = path.read_text()
            if 'G-3G1RNC5YLT' in content:
              continue

            path.write_text(content.replace('</head>', f'{snippet}\n</head>', 1))
          PY
      - name: Upload Documentation Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: ./docs
          retention-days: 1

  deploy:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    needs:
      [
        build-react,
        build-vue,
        build-typescript,
        build-angular,
        generate-coverage,
        generate-docs,
        # generate-performance-report,
      ]
    steps:
      - uses: actions/checkout@v4
      - name: Download React Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: react-build
          path: ./public
      - name: Download Vue Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: vue-build
          path: ./public
      - name: Download TypeScript Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: typescript-build
          path: ./public
      - name: Download Angular Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: angular-build
          path: ./public
      - name: Copy index.html to public directory
        run: cp ./examples/index.html ./public/index.html
      - name: Clean up old documentation and coverage directories
        run: |
          rm -rf ./public/docs
          rm -rf ./public/coverage
      - name: Copy documentation to public directory
        uses: actions/download-artifact@v4
        with:
          name: documentation
          path: ./public/docs
      - name: Download Coverage Report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: ./public/coverage
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          publish_dir: ./public
          allow_empty_commit: true
