name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

# permissions:
#   contents: write

jobs:
  build-react:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
      - name: Install dependencies
        run: yarn
        working-directory: ./examples/vite+react
      - name: Build React App
        run: yarn build
        working-directory: ./examples/vite+react
      - name: Upload React Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: react-build
          path: ./examples/vite+react/build
          retention-days: 1

  build-vue:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: ./examples/vue
      - name: Build Vue App
        run: npm run build
        working-directory: ./examples/vue
      - name: Upload Vue Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vue-build
          path: ./examples/vue/build
          retention-days: 1

  build-typescript:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
      - name: Install dependencies
        run: npm ci
        working-directory: ./examples/typescript
      - name: Build TypeScript App
        run: npm run build
        working-directory: ./examples/typescript
      - name: Upload TypeScript Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: typescript-build
          path: ./examples/typescript/build
          retention-days: 1

  build-angular:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
      - name: Install build tools
        run: npm i -g pnpm
      - name: Install dependencies
        run: pnpm i --frozen-lockfile
        working-directory: ./examples/angular
      - name: Build Angular App
        run: pnpm run build -- --prod
        working-directory: ./examples/angular
      - name: Upload Angular Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: angular-build
          path: ./examples/angular/dist/angular/browser
          retention-days: 1

  generate-coverage:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
      - name: Install build tools
        run: npm i -g pnpm
      - name: Install dependencies
        run: pnpm i --frozen-lockfile
      - name: Run tests with coverage
        run: pnpm test:coverage
      - name: Add Google tag to generated coverage pages
        run: |
          python3 <<'PY'
          from pathlib import Path
          from textwrap import dedent

          snippet = dedent("""
          <!-- Google tag (gtag.js) -->
          <script async src=\"https://www.googletagmanager.com/gtag/js?id=G-3G1RNC5YLT\"></script>
          <script>
            window.dataLayer = window.dataLayer || [];
            function gtag(){dataLayer.push(arguments);}
            gtag('js', new Date());

            gtag('config', 'G-3G1RNC5YLT');
          </script>
          """).strip()

          for path in Path('./coverage/lcov-report').glob('*.html'):
            if not path.exists():
              continue

            content = path.read_text()
            if 'G-3G1RNC5YLT' in content:
              continue

            path.write_text(content.replace('</head>', f'{snippet}\n</head>', 1))
          PY
      - name: Prefix generated coverage titles
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          prefix = 'idb-ts --- '
          title_pattern = re.compile(r'<title>(.*?)</title>', re.DOTALL)

          for path in Path('./coverage/lcov-report').glob('*.html'):
            if not path.exists():
              continue

            content = path.read_text()
            if prefix in content:
              continue

            content = title_pattern.sub(lambda match: f'<title>{prefix}{match.group(1)}</title>', content, count=1)
            path.write_text(content)
          PY
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./coverage
          retention-days: 1

